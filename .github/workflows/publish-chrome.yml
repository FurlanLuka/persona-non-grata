name: Publish to Chrome Web Store

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip extension
        run: zip -r extension.zip manifest.json content.js popup.html popup.css popup.js icons/

      - name: Upload to Chrome Web Store
        run: npx chrome-webstore-upload-cli upload --source extension.zip --extension-id ${{ secrets.CHROME_EXTENSION_ID }} --auto-publish
        env:
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
